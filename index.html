<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kacey 微记</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f7ff;
    color: #2d3748;
    min-height: 100vh;
    padding: 1rem 1rem 2rem;
  }
  .container { max-width: 520px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.6rem;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* 标签页导航 */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.2rem;
    background: #fff;
    border-radius: 12px;
    padding: 4px;
    border: 1px solid #e0ecf5;
    box-shadow: 0 1px 4px #0ea5e910;
  }
  .tab-btn {
    flex: 1;
    padding: 0.55rem 0;
    background: transparent;
    border: none;
    border-radius: 9px;
    color: #94a3b8;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #fff;
    font-weight: 600;
  }
  .tab-page { display: none; }
  .tab-page.active { display: block; }

  /* 连续打卡 */
  .streak-bar { text-align: center; margin-bottom: 1rem; }
  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: #fff;
    border: 1px solid #e0ecf5;
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    font-size: 0.82rem;
    color: #0ea5e9;
  }
  .streak-num { font-weight: 700; font-size: 1rem; color: #0284c7; }
  .streak-cal {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 0.4rem;
    flex-wrap: wrap;
  }
  .streak-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    background: #e0ecf5;
    border: 1px solid #cbd5e1;
  }
  .streak-dot.active { background: #0ea5e9; border-color: #0ea5e9; }
  .streak-dot.today { box-shadow: 0 0 0 2px #0ea5e955; }

  .date-display {
    text-align: center;
    font-size: 0.85rem;
    color: #64748b;
    margin-bottom: 1.2rem;
  }
  .input-card {
    background: #fff;
    border-radius: 16px;
    padding: 1.3rem;
    margin-bottom: 1rem;
    border: 1px solid #e0ecf5;
    box-shadow: 0 1px 4px #0ea5e908;
  }
  .field { margin-bottom: 1rem; }
  .field:last-of-type { margin-bottom: 1.2rem; }
  .field label {
    display: block;
    font-size: 0.82rem;
    color: #64748b;
    margin-bottom: 0.35rem;
  }
  .field label .icon { margin-right: 0.3rem; }
  .field textarea, .field input[type="text"] {
    width: 100%;
    background: #f8fafc;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    color: #2d3748;
    font-size: 0.92rem;
    font-family: inherit;
    resize: none;
    transition: border-color 0.2s;
  }
  .field textarea { height: 48px; }
  .field textarea:focus, .field input:focus {
    outline: none;
    border-color: #0284c7;
  }
  .save-btn, .action-btn {
    width: 100%;
    padding: 0.7rem;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
  }
  .save-btn:hover, .action-btn:hover { opacity: 0.9; }
  .save-btn:active, .action-btn:active { transform: scale(0.98); }

  /* 工具栏 */
  .toolbar {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .toolbar button {
    flex: 1;
    min-width: 0;
    padding: 0.5rem 0.3rem;
    background: #fff;
    border: 1px solid #e0ecf5;
    border-radius: 10px;
    color: #64748b;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .toolbar button:hover { background: #f0f7ff; color: #2d3748; border-color: #94a3b8; }

  /* 搜索栏 */
  .search-bar { display: none; margin-bottom: 1rem; }
  .search-bar.show { display: block; }
  .search-bar input {
    width: 100%;
    background: #f8fafc;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    color: #2d3748;
    font-size: 0.88rem;
    font-family: inherit;
  }
  .search-bar input:focus { outline: none; border-color: #0ea5e9; }
  .search-bar .search-hint {
    font-size: 0.72rem;
    color: #94a3b8;
    margin-top: 0.25rem;
    padding-left: 0.2rem;
  }
  mark {
    background: #0ea5e933;
    color: #0284c7;
    border-radius: 2px;
    padding: 0 2px;
  }

  /* 文案生成器 */
  .copywriter-panel { display: none; background: #fff; border: 1px solid #e0ecf5; border-radius: 16px; padding: 1.1rem; margin-bottom: 1rem; }
  .copywriter-panel.show { display: block; }
  .copywriter-panel h3 { font-size: 0.88rem; color: #0ea5e9; margin-bottom: 0.7rem; }
  .style-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.8rem; }
  .style-chip {
    padding: 0.25rem 0.6rem;
    background: #f0f7ff;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 0.78rem;
    color: #64748b;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .style-chip.active { background: #0ea5e925; color: #0284c7; border-color: #0284c766; }
  .copy-output {
    background: #f8fafc;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    padding: 0.8rem;
    font-size: 0.85rem;
    line-height: 1.7;
    color: #334155;
    min-height: 70px;
    white-space: pre-wrap;
    position: relative;
    margin-top: 0.8rem;
  }
  .copy-output .copy-btn {
    position: absolute;
    top: 0.4rem;
    right: 0.4rem;
    background: #f0f7ff;
    border: 1px solid #bae6fd;
    border-radius: 6px;
    color: #64748b;
    font-size: 0.72rem;
    padding: 0.15rem 0.45rem;
    cursor: pointer;
    font-family: inherit;
  }
  .copy-output .copy-btn:hover { color: #fff; }
  .gen-btn {
    width: 100%;
    padding: 0.55rem;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .gen-btn:hover { opacity: 0.9; }
  .gen-hint { font-size: 0.72rem; color: #94a3b8; margin-top: 0.35rem; text-align: center; }

  .toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #f0f7ff;
    color: #0284c7;
    padding: 0.55rem 1.1rem;
    border-radius: 10px;
    font-size: 0.88rem;
    transition: transform 0.3s ease;
    z-index: 99;
    border: 1px solid #cbd5e1;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .section-header {
    font-size: 0.95rem;
    color: #64748b;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e0ecf5;
  }

  /* 日记条目 */
  .entry {
    background: #fff;
    border-radius: 14px;
    padding: 1.1rem 1.2rem;
    margin-bottom: 0.7rem;
    border: 1px solid #e0ecf5;
    position: relative;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-date { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.6rem; }
  .entry-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .entry-row .tag {
    flex-shrink: 0;
    font-size: 0.75rem;
    padding: 0.08rem 0.45rem;
    border-radius: 6px;
    height: fit-content;
    margin-top: 0.15rem;
  }
  .tag-highlight { background: #0ea5e918; color: #0284c7; }
  .tag-lesson { background: #8b5cf618; color: #0ea5e9; }
  .tag-goal { background: #06b6d418; color: #0284c7; }
  .entry-actions {
    position: absolute;
    top: 0.7rem;
    right: 0.7rem;
    display: flex;
    gap: 0.25rem;
  }
  .entry-actions button {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 0.78rem;
    padding: 0.15rem 0.35rem;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }
  .entry-actions button:hover { color: #0284c7; background: #0ea5e915; }
  .entry-actions .btn-copy:hover { color: #0284c7; background: #0ea5e915; }
  .empty, .no-results {
    text-align: center;
    color: #94a3b8;
    font-size: 0.88rem;
    padding: 1.5rem 0;
  }

  /* ====== 灵感速记 ====== */
  .idea-quick {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }
  .idea-quick textarea {
    flex: 1;
    background: #f8fafc;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    color: #2d3748;
    font-size: 0.92rem;
    font-family: inherit;
    resize: none;
    line-height: 1.5;
  }
  .idea-quick textarea:focus { outline: none; border-color: #0ea5e9; }
  .idea-quick button {
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 1rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .idea-tags {
    display: flex;
    gap: 0.35rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .idea-tag {
    padding: 0.22rem 0.6rem;
    background: #f0f7ff;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 0.78rem;
    color: #64748b;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .idea-tag.active { border-color: #0ea5e988; color: #0ea5e9; background: #0ea5e920; }
  .idea-filter-row {
    display: flex;
    gap: 0.35rem;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
  }
  .idea-filter {
    padding: 0.2rem 0.55rem;
    background: transparent;
    border: 1px solid #cbd5e1;
    border-radius: 7px;
    font-size: 0.72rem;
    color: #94a3b8;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .idea-filter.active { border-color: #0ea5e966; color: #0ea5e9; }
  .idea-card {
    background: #fff;
    border: 1px solid #e0ecf5;
    border-radius: 12px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    animation: fadeIn 0.25s ease;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .idea-card-body { flex: 1; min-width: 0; }
  .idea-card-text { font-size: 0.88rem; line-height: 1.5; word-break: break-word; }
  .idea-card-meta {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.35rem;
    align-items: center;
  }
  .idea-card-tag {
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 5px;
    background: #0ea5e918;
    color: #0ea5e9;
  }
  .idea-card-time { font-size: 0.68rem; color: #94a3b8; }
  .idea-card-actions {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    flex-shrink: 0;
  }
  .idea-card-actions button {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0.15rem 0.3rem;
    border-radius: 5px;
    transition: all 0.15s;
  }
  .idea-card-actions button:hover { color: #0ea5e9; background: #0ea5e915; }
  .idea-card-actions .btn-del:hover { color: #0284c7; background: #0ea5e915; }
  .idea-card.selected { border-color: #0ea5e966; background: #0ea5e910; }
  .idea-check {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid #cbd5e1;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 0.15rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: transparent;
    transition: all 0.15s;
  }
  .idea-card.selected .idea-check { border-color: #0ea5e9; background: #38bdf8; color: #fff; }
  .select-hint { font-size: 0.72rem; color: #94a3b8; margin-bottom: 0.6rem; }
  .selected-count { color: #0ea5e9; font-weight: 600; }

  /* ====== 选题看板 ====== */
  .kanban {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
  }
  .kanban-col {
    flex: 1;
    min-width: 150px;
    background: #f8fafc;
    border: 1px solid #e0ecf5;
    border-radius: 14px;
    padding: 0.7rem;
  }
  .kanban-col-header {
    font-size: 0.78rem;
    font-weight: 600;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .kanban-col-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-want { background: #38bdf8; }
  .dot-doing { background: #8b5cf6; }
  .dot-done { background: #22c55e; }
  .kanban-col-count {
    font-size: 0.68rem;
    color: #94a3b8;
    font-weight: 400;
    margin-left: auto;
  }
  .kanban-card {
    background: #fff;
    border: 1px solid #e0ecf5;
    border-radius: 10px;
    padding: 0.65rem 0.75rem;
    margin-bottom: 0.4rem;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
  }
  .kanban-card:active { cursor: grabbing; }
  .kanban-card.dragging { opacity: 0.4; transform: scale(0.95); }
  .kanban-card-title {
    font-size: 0.82rem;
    line-height: 1.4;
    word-break: break-word;
    padding-right: 1.2rem;
  }
  .kanban-card-source {
    font-size: 0.65rem;
    color: #94a3b8;
    margin-top: 0.3rem;
  }
  .kanban-card-actions {
    position: absolute;
    top: 0.4rem;
    right: 0.4rem;
    display: flex;
    gap: 0.15rem;
  }
  .kanban-card-actions button {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 0.7rem;
    padding: 0.1rem 0.25rem;
    border-radius: 4px;
  }
  .kanban-card-actions button:hover { color: #0284c7; background: #0ea5e915; }
  .kanban-add {
    width: 100%;
    padding: 0.4rem;
    background: transparent;
    border: 1px dashed #cbd5e1;
    border-radius: 8px;
    color: #94a3b8;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .kanban-add:hover { border-color: #94a3b8; color: #64748b; }
  .kanban-input-wrap { margin-bottom: 0.4rem; }
  .kanban-input-wrap textarea {
    width: 100%;
    background: #f8fafc;
    border: 1px solid #bae6fd;
    border-radius: 8px;
    padding: 0.45rem 0.6rem;
    color: #2d3748;
    font-size: 0.82rem;
    font-family: inherit;
    resize: none;
    line-height: 1.4;
  }
  .kanban-input-wrap textarea:focus { outline: none; border-color: #0ea5e9; }

  .drop-hint {
    border: 2px dashed #38bdf855;
    border-radius: 10px;
    padding: 0.8rem;
    text-align: center;
    color: #0284c755;
    font-size: 0.75rem;
    margin-bottom: 0.4rem;
  }

  /* 登录页 */
  .auth-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
  }
  .auth-card {
    background: #fff;
    border-radius: 20px;
    padding: 2rem 1.5rem;
    width: 100%;
    max-width: 360px;
    border: 1px solid #e0ecf5;
    box-shadow: 0 4px 20px #0ea5e915;
  }
  .auth-card h2 {
    text-align: center;
    font-size: 1.3rem;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .auth-field {
    margin-bottom: 1rem;
  }
  .auth-field label {
    display: block;
    font-size: 0.82rem;
    color: #64748b;
    margin-bottom: 0.3rem;
  }
  .auth-field input {
    width: 100%;
    padding: 0.65rem 0.8rem;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-size: 0.92rem;
    font-family: inherit;
    background: #f8fafc;
    color: #2d3748;
  }
  .auth-field input:focus { outline: none; border-color: #38bdf8; }
  .auth-btn {
    width: 100%;
    padding: 0.7rem;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-top: 0.5rem;
  }
  .auth-btn:hover { opacity: 0.9; }
  .auth-switch {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.82rem;
    color: #64748b;
  }
  .auth-switch a {
    color: #0ea5e9;
    cursor: pointer;
    text-decoration: none;
    font-weight: 600;
  }
  .auth-error {
    color: #ef4444;
    font-size: 0.8rem;
    text-align: center;
    margin-top: 0.5rem;
    min-height: 1.2rem;
  }
  .logout-btn {
    background: none;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    color: #94a3b8;
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    cursor: pointer;
    font-family: inherit;
    float: right;
    margin-top: -0.3rem;
  }
  .logout-btn:hover { color: #0284c7; border-color: #0ea5e9; }
  .sync-status {
    text-align: center;
    font-size: 0.7rem;
    color: #94a3b8;
    margin-bottom: 0.5rem;
  }
</style>
</head>
<body>
<!-- 登录页 -->
<div class="container auth-page" id="authPage">
  <div class="auth-card">
    <h2>📓 Kacey 微记</h2>
    <div id="authForm">
      <div class="auth-field">
        <label>邮箱</label>
        <input type="email" id="authEmail" placeholder="your@email.com">
      </div>
      <div class="auth-field">
        <label>密码</label>
        <input type="password" id="authPassword" placeholder="至少6位">
      </div>
      <button class="auth-btn" id="authBtn" onclick="handleAuth()">登录</button>
      <div class="auth-error" id="authError"></div>
      <div class="auth-switch">
        <span id="authSwitchText">还没有账号？</span>
        <a onclick="toggleAuthMode()" id="authSwitchLink">注册</a>
      </div>
    </div>
  </div>
</div>

<!-- 主应用 -->
<div class="container" id="appPage" style="display:none">
  <h1>📓 Kacey 微记 <button class="logout-btn" onclick="handleLogout()">退出</button></h1>
  <div class="sync-status" id="syncStatus">☁️ 已连接云端</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('journal')">📓 日记</button>
    <button class="tab-btn" onclick="switchTab('ideas')">💡 灵感</button>
    <button class="tab-btn" onclick="switchTab('kanban')">🎬 选题</button>
  </div>

  <!-- ========== 日记页 ========== -->
  <div class="tab-page active" id="page-journal">

<script>
// ============ Supabase 初始化 ============
const SUPABASE_URL = 'https://dzqhucvyvsemsqtrrqrs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_lFt7zsxeJ6heKa9SM6-nUQ_tOVGCRWc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;

// ============ 认证 ============
let isLoginMode = true;

function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  document.getElementById('authBtn').textContent = isLoginMode ? '登录' : '注册';
  document.getElementById('authSwitchText').textContent = isLoginMode ? '还没有账号？' : '已有账号？';
  document.getElementById('authSwitchLink').textContent = isLoginMode ? '注册' : '登录';
  document.getElementById('authError').textContent = '';
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = '请填写邮箱和密码'; return; }
  if (password.length < 6) { errEl.textContent = '密码至少6位'; return; }

  document.getElementById('authBtn').disabled = true;
  document.getElementById('authBtn').textContent = '请稍候...';

  let result;
  if (isLoginMode) {
    result = await sb.auth.signInWithPassword({ email, password });
  } else {
    result = await sb.auth.signUp({ email, password });
  }

  document.getElementById('authBtn').disabled = false;
  document.getElementById('authBtn').textContent = isLoginMode ? '登录' : '注册';

  if (result.error) {
    errEl.textContent = result.error.message;
    return;
  }
  if (!isLoginMode && result.data?.user?.identities?.length === 0) {
    errEl.textContent = '该邮箱已注册，请直接登录';
    return;
  }
  if (!isLoginMode) {
    errEl.style.color = '#0284c7';
    errEl.textContent = '注册成功！请查收验证邮件，或直接登录';
    return;
  }
  currentUser = result.data.user;
  showApp();
}

async function handleLogout() {
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById('authPage').style.display = '';
  document.getElementById('appPage').style.display = 'none';
}

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
  }
}

async function showApp() {
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('appPage').style.display = '';
  await loadAll();
}

// ============ 通用 ============
let cachedEntries = [], cachedIdeas = [], cachedKanban = [];

async function loadAll() {
  const uid = currentUser.id;
  const [e, i, k] = await Promise.all([
    sb.from('entries').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
    sb.from('ideas').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
    sb.from('kanban').select('*').eq('user_id', uid).order('created_at', { ascending: true }),
  ]);
  cachedEntries = (e.data || []).map(r => ({ ...r, _id: r.id }));
  cachedIdeas = (i.data || []).map(r => ({ ...r, _id: r.id, id: r.id }));
  cachedKanban = (k.data || []).map(r => ({ ...r, _id: r.id, id: r.id }));
  document.getElementById('dateDisplay').textContent = formatDate(new Date().toISOString());
  renderStreak();
  renderTimeline();
  renderIdeas();
  renderKanban();
  document.getElementById('syncStatus').textContent = '☁️ 已同步';
}

function load(table) {
  if (table === 'entries') return cachedEntries;
  if (table === 'ideas') return cachedIdeas;
  if (table === 'kanban') return cachedKanban;
  return [];
}

function formatDate(iso) {
  const d = new Date(iso);
  const weekdays = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 周${weekdays[d.getDay()]}`;
}
function formatTime(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ============ 标签页切换 ============
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', b.textContent.includes({'journal':'日记','ideas':'灵感','kanban':'选题'}[name]));
  });
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

// ============ 日记模块 ============
function calcStreak() {
  const entries = load('entries');
  if (entries.length === 0) return { streak: 0, dates: new Set() };
  const dates = new Set(entries.map(e => e.date));
  let streak = 0;
  const d = new Date();
  let check = todayStr();
  if (!dates.has(check)) {
    d.setDate(d.getDate() - 1);
    check = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const cursor = new Date(check);
  while (dates.has(`${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`)) {
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return { streak, dates };
}

function renderStreak() {
  const { streak, dates } = calcStreak();
  document.getElementById('streakNum').textContent = streak;
  const cal = document.getElementById('streakCal');
  const today = new Date();
  const dots = [];
  for (let i = 20; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    dots.push(`<div class="streak-dot${dates.has(ds)?' active':''}${i===0?' today':''}" title="${formatDate(ds)}"></div>`);
  }
  cal.innerHTML = dots.join('');
}

function toggleSearch() {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('show');
  if (bar.classList.contains('show')) document.getElementById('searchInput').focus();
  else { document.getElementById('searchInput').value = ''; renderTimeline(); }
}

function highlightText(text, q) {
  if (!q) return esc(text);
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function renderTimeline() {
  const entries = load('entries');
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const el = document.getElementById('timeline');
  let filtered = entries;
  if (q) filtered = entries.filter(e =>
    [e.highlight, e.lesson, e.goal].some(v => v && v.toLowerCase().includes(q))
  );
  if (!entries.length) { el.innerHTML = '<div class="empty">还没有记录，写下你的第一篇吧 ✍️</div>'; return; }
  if (!filtered.length) { el.innerHTML = '<div class="no-results">没有找到匹配的记录</div>'; return; }
  el.innerHTML = filtered.map(e => {
    const ri = entries.indexOf(e);
    return `<div class="entry">
      <div class="entry-actions">
        <button onclick="editEntry(${ri})" title="编辑">✏️</button>
        <button title="转为选题" onclick="entryToKanban(${ri})">🎬</button>
        <button class="btn-copy" onclick="copyEntry(${ri})" title="复制">📋</button>
        <button onclick="deleteEntry(${ri})" title="删除">✕</button>
      </div>
      <div class="entry-date">${formatDate(e.date)}</div>
      ${e.highlight ? `<div class="entry-row"><span class="tag tag-highlight">亮点</span><span>${highlightText(e.highlight,q)}</span></div>` : ''}
      ${e.lesson ? `<div class="entry-row"><span class="tag tag-lesson">收获</span><span>${highlightText(e.lesson,q)}</span></div>` : ''}
      ${e.goal ? `<div class="entry-row"><span class="tag tag-goal">目标</span><span>${highlightText(e.goal,q)}</span></div>` : ''}
    </div>`;
  }).join('');
}

async function editEntry(i) {
  const e = load('entries')[i];
  if (!e) return;
  const h = prompt('✨ 今日亮点：', e.highlight || '');
  if (h === null) return;
  const l = prompt('💡 一个收获：', e.lesson || '');
  if (l === null) return;
  const g = prompt('🎯 明日目标：', e.goal || '');
  if (g === null) return;
  await sb.from('entries').update({ highlight: h.trim(), lesson: l.trim(), goal: g.trim() }).eq('id', e._id);
  e.highlight = h.trim();
  e.lesson = l.trim();
  e.goal = g.trim();
  renderTimeline();
  showToast('✏️ 已修改');
}

async function deleteEntry(i) {
  if (!confirm('确定删除？')) return;
  const e = load('entries')[i];
  if (!e) return;
  await sb.from('entries').delete().eq('id', e._id);
  cachedEntries.splice(i, 1);
  renderTimeline(); renderStreak();
}

function copyEntry(i) {
  const e = load('entries')[i];
  let t = `📓 ${formatDate(e.date)}\n`;
  if (e.highlight) t += `✨ ${e.highlight}\n`;
  if (e.lesson) t += `💡 ${e.lesson}\n`;
  if (e.goal) t += `🎯 ${e.goal}\n`;
  navigator.clipboard.writeText(t).then(() => showToast('📋 已复制'));
}

async function entryToKanban(i) {
  const e = load('entries')[i];
  const title = e.highlight || e.lesson || e.goal;
  if (!title) return;
  const { data } = await sb.from('kanban').insert({ user_id: currentUser.id, title, status: 'want', source: '日记' }).select().single();
  if (data) cachedKanban.push({ ...data, id: data.id, _id: data.id });
  renderKanban();
  showToast('🎬 已添加到选题看板');
}

document.getElementById('saveBtn').addEventListener('click', async () => {
  const h = document.getElementById('highlight').value.trim();
  const l = document.getElementById('lesson').value.trim();
  const g = document.getElementById('goal').value.trim();
  if (!h && !l && !g) return;
  const { data } = await sb.from('entries').insert({ user_id: currentUser.id, date: todayStr(), highlight: h, lesson: l, goal: g }).select().single();
  if (data) cachedEntries.unshift({ ...data, _id: data.id });
  document.getElementById('highlight').value = '';
  document.getElementById('lesson').value = '';
  document.getElementById('goal').value = '';
  showToast('✅ 已保存');
  renderTimeline();
  renderStreak();
});

// --- 文案 ---
let currentStyle = 'xiaohongshu';
document.getElementById('styleChips').addEventListener('click', e => {
  const chip = e.target.closest('.style-chip');
  if (!chip) return;
  document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentStyle = chip.dataset.style;
});
function toggleCopywriter() { document.getElementById('copywriterPanel').classList.toggle('show'); }

function generateCopy() {
  const entries = load('entries');
  if (!entries.length) { showToast('❌ 先写一篇日记吧'); return; }
  const recent = entries.slice(0,3);
  const { streak } = calcStreak();
  const hl = recent.map(e=>e.highlight).filter(Boolean);
  const ls = recent.map(e=>e.lesson).filter(Boolean);
  const gl = recent.map(e=>e.goal).filter(Boolean);
  const s = streak > 0 ? streak : 1;
  const pick = () => ['✨','💫','🌟','💡','🎯','📖','🌈','💪','🔥','⭐'][Math.random()*10|0];
  const T = {
    xiaohongshu: () => [
      `${pick()} 今日份生活碎片 | 记录第${s}天`, '',
      hl[0]?`${pick()} 今日亮点：${hl[0]}`:'', ls[0]?`${pick()} 小小收获：${ls[0]}`:'', gl[0]?`${pick()} 明日flag：${gl[0]}`:'',
      '', `坚持记录生活的第${s}天`, `每天进步一点点 ${pick()}`, '', '#每日记录 #生活碎片 #自律打卡 #成长日记'
    ].filter(l=>l!==undefined).join('\n'),
    weibo: () => [
      `📓 日记碎片 Day ${s}`, hl[0]?`亮点💡${hl[0]}`:'', ls[0]?`收获📚${ls[0]}`:'', gl[0]?`明天🎯${gl[0]}`:'',
      '', '每天三句话，记录真实的自己。'
    ].filter(Boolean).join('\n'),
    douyin: () => [
      `🔥 打卡第${s}天`, '', hl[0]?`今天最开心的事👉 ${hl[0]}`:'', ls[0]?`今天学到了👉 ${ls[0]}`:'', gl[0]?`明天要搞定👉 ${gl[0]}`:'',
      '', '别人在刷视频 我在写日记', '坚持记录 未来的你会感谢现在的自己', '', '#日记 #自律 #每日打卡 #成长'
    ].filter(Boolean).join('\n'),
    zhihu: () => [
      `【日记实验：连续记录第${s}天的感受】`, '', '从开始每天用三句话记录生活，我发现了一些变化：', '',
      hl[0]?`今天值得记下的：${hl[0]}`:'', ls[0]?`一个小收获：${ls[0]}`:'', gl[0]?`给明天的自己：${gl[0]}`:'',
      '', '三句话不多，但积累下来，就是一本属于自己的成长手册。', '你有记日记的习惯吗？'
    ].filter(Boolean).join('\n')
  };
  document.getElementById('copyOutput').style.display = 'block';
  document.getElementById('copyText').textContent = T[currentStyle]();
}

function copyCopyText() {
  navigator.clipboard.writeText(document.getElementById('copyText').textContent).then(() => showToast('📋 已复制'));
}

// --- 导出 ---
function exportJSON() {
  const e = load('entries');
  if (!e.length) { showToast('❌ 没有记录'); return; }
  downloadBlob(new Blob([JSON.stringify(e,null,2)],{type:'application/json'}), `微日记_${todayStr()}.json`);
  showToast('💾 已导出');
}
function exportMarkdown() {
  const entries = load('entries');
  if (!entries.length) { showToast('❌ 没有记录'); return; }
  const { streak } = calcStreak();
  let md = `# 📓 Kacey 微记\n\n> 连续打卡 ${streak} 天 | 共 ${entries.length} 条记录\n\n---\n\n`;
  entries.forEach(e => {
    md += `## ${formatDate(e.date)}\n\n`;
    if (e.highlight) md += `- ✨ **亮点**：${e.highlight}\n`;
    if (e.lesson) md += `- 💡 **收获**：${e.lesson}\n`;
    if (e.goal) md += `- 🎯 **目标**：${e.goal}\n`;
    md += '\n';
  });
  downloadBlob(new Blob([md],{type:'text/markdown'}), `微日记_${todayStr()}.md`);
  showToast('📄 已导出');
}
function downloadBlob(b,f) { const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f;a.click();URL.revokeObjectURL(a.href); }

async function translateText(text, targetLang) {
  if (!text || targetLang === 'zh') return text;
  const langMap = { en: 'en', fr: 'fr', es: 'es' };
  const to = langMap[targetLang];
  if (!to) return text;
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=zh|${to}`);
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData.translatedText) {
      const t = data.responseData.translatedText;
      if (t.toUpperCase() === text.toUpperCase()) return text;
      return t;
    }
    return text;
  } catch { return text; }
}

async function translateAll(texts, targetLang) {
  if (targetLang === 'zh') return texts;
  const results = [];
  for (const t of texts) {
    results.push(await translateText(t, targetLang));
  }
  return results;
}

async function editKanbanCard(id) {

function kanbanDragStart(e, id) {
  dragId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function kanbanDragEnd(e) {
  e.target.classList.remove('dragging');
  dragId = null;
}
async function kanbanDrop(e, status) {
  e.preventDefault();
  if (!dragId) return;
  const card = cachedKanban.find(i => i.id === dragId);
  if (card) {
    card.status = status;
    await sb.from('kanban').update({ status }).eq('id', dragId);
    renderKanban();
  }
  dragId = null;
}
